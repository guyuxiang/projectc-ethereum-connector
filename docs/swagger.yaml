paths:
  /inner/chain-data-subscribe/{networkCode}/address-subscribe:
    post:
      consumes:
      - application/json
      description: Register a contract-address log subscription based on eth_getLogs
        for callback processing
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Contract address subscription payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AddressSubscribeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
      summary: Subscribe contract address logs
      tags:
      - Subscription
  /inner/chain-data-subscribe/{networkCode}/address-subscribe-cancel:
    post:
      consumes:
      - application/json
      description: Update or stop a contract-address log subscription
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Contract address subscription cancel payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AddressSubscribeCancelRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
      summary: Cancel contract address log subscription
      tags:
      - Subscription
  /inner/chain-data-subscribe/{networkCode}/tx-subscribe:
    post:
      consumes:
      - application/json
      description: Register a transaction subscription for callback processing
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Transaction subscription payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TxSubscribeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
      summary: Subscribe transaction
      tags:
      - Subscription
  /inner/chain-data-subscribe/{networkCode}/tx-subscribe-cancel:
    post:
      consumes:
      - application/json
      description: Cancel a registered transaction subscription
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Transaction subscription cancel payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TxSubscribeCancelRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
      summary: Cancel transaction subscription
      tags:
      - Subscription
  /inner/chain-data/{networkCode}/common/address-balance:
    post:
      consumes:
      - application/json
      description: Query native token balance of an address on the configured network
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Address balance query payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AddressBalanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
      summary: Query address balance
      tags:
      - Common
  /inner/chain-data/{networkCode}/common/latest-block:
    post:
      description: Query latest block number and timestamp from the configured network
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
      summary: Query latest block
      tags:
      - Common
  /inner/chain-data/{networkCode}/common/token-add:
    post:
      consumes:
      - application/json
      description: Add a token definition into database-backed EVM token registry.
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Token add request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TokenAddRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Add or update token
      tags:
      - Common
  /inner/chain-data/{networkCode}/common/token-balance:
    post:
      consumes:
      - application/json
      description: Query token balance of an address for a token configured in the
        database-backed EVM token registry
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Token balance query payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TokenBalanceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
      summary: Query token balance
      tags:
      - Common
  /inner/chain-data/{networkCode}/common/token-delete:
    post:
      consumes:
      - application/json
      description: Delete a token definition from database-backed EVM token registry
        by token code.
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Token delete request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TokenDeleteRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Delete token
      tags:
      - Common
  /inner/chain-data/{networkCode}/common/token-get:
    post:
      consumes:
      - application/json
      description: Get a token definition from database-backed EVM token registry
        by token code.
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Token get request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TokenGetRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get token
      tags:
      - Common
  /inner/chain-data/{networkCode}/common/token-list:
    post:
      consumes:
      - application/json
      description: List token definitions from database-backed EVM token registry.
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Token list request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TokenListRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: List tokens
      tags:
      - Common
  /inner/chain-data/{networkCode}/common/token-supply:
    post:
      consumes:
      - application/json
      description: Query total supply of a token configured in the database-backed
        EVM token registry
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Token supply query payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TokenSupplyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
      summary: Query token supply
      tags:
      - Common
  /inner/chain-data/{networkCode}/common/tx-query:
    post:
      consumes:
      - application/json
      description: Query transaction status and decoded events by transaction hash
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Transaction query payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TxQueryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
      summary: Query transaction
      tags:
      - Common
  /inner/chain-invoke/{networkCode}/common/tx-send:
    post:
      consumes:
      - application/json
      description: Submit either a signed raw EVM transaction or an ERC-4337 UserOperation
        to the configured RPC or bundler
      parameters:
      - description: Configured network code
        in: path
        name: networkCode
        required: true
        type: string
      - description: Signed transaction payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.TxSendRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
      summary: Send transaction
      tags:
      - Common
  /inner/chain-invoke/{networkCode}/wallet/faucet:
    post:
      consumes:
