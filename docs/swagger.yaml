          $ref: '#/definitions/models.ContractConfigPushMessage'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
      summary: Push contract config
      tags:
      - Contract
  /inner/contract/list/{networkCode}:
