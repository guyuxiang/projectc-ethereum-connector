      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.Response'
      summary: List web3 contract info
      tags:
      - Contract
  /open/ops-client/contract/contract-config-push-record/apply:
