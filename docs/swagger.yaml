basePath: /api/v1
definitions:
  models.AddressBalanceRequest:
    properties:
      address:
        type: string
    type: object
  models.AddressSubscribeCancelRequest:
    properties:
      address:
        type: string
      endBlockNumber:
        type: integer
    type: object
  models.AddressSubscribeRange:
    properties:
      endBlockNumber:
        type: integer
      startBlockNumber:
        type: integer
    type: object
  models.AddressSubscribeRequest:
    properties:
      address:
        type: string
      subscribeRange:
        $ref: '#/definitions/models.AddressSubscribeRange'
    type: object
  models.ApplyContractConfigPushRecordRequest:
    properties:
      pushRecordCode:
        type: string
    type: object
  models.BalanceChargeRequest:
    type: object
  models.ContractConfigPushItem:
    properties:
      contractAbi:
        type: string
      contractAddress:
        type: string
      contractCode:
        type: string
      contractDeployTxBlockNumber:
        type: integer
      networkCode:
        type: string
    type: object
  models.ContractConfigPushMessage:
    properties:
      description:
        type: string
      pushId:
        type: string
      pushItems:
        items:
          $ref: '#/definitions/models.ContractConfigPushItem'
        type: array
    type: object
  models.ErrorResponse:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  models.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
    type: object
  models.TokenAddRequest:
    properties:
      decimals:
        type: integer
      tokenAddress:
        type: string
      tokenCode:
        type: string
    type: object
  models.TokenBalanceRequest:
    properties:
      address:
        type: string
      tokenCode:
        type: string
    type: object
  models.TokenDeleteRequest:
    properties:
      tokenCode:
        type: string
    type: object
  models.TokenGetRequest:
    properties:
      tokenCode:
        type: string
    type: object
  models.TokenListRequest:
    type: object
  models.TokenSupplyRequest:
    properties:
      tokenCode:
        type: string
    type: object
  models.TxQueryRequest:
    properties:
      txCode:
        type: string
    type: object
  models.TxSendRequest:
    properties:
      eip7702Auth:
        additionalProperties: true
        type: object
      entryPoint:
        type: string
      txSignResult:
        type: string
      userOperation:
        additionalProperties: true
        type: object
    type: object
  models.TxSubscribeCancelRequest:
    properties:
      txCode:
        type: string
    type: object
  models.TxSubscribeRange:
    properties:
      endTimestamp:
        type: integer
    type: object
  models.TxSubscribeRequest:
    properties:
      subscribeRange:
        $ref: '#/definitions/models.TxSubscribeRange'
      txCode:
        type: string
    type: object
info:
  contact:
    email: gu_yuxiang@qq.com
    name: guyuxiang
    url: https://guyuxiang.github.io
  description: This is a projectc-ethereum-connector.
  license:
    name: Apache 2.0
